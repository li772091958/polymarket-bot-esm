<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">一图读懂 Polymarket Copy Trade Bot</title>
  <desc id="desc">Polymarket 跟单机器人宣传信息图，展示策略筛选、额度计算、下单成交、风控和辅助功能。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c111d"/>
      <stop offset="0.56" stop-color="#101827"/>
      <stop offset="1" stop-color="#13201e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2af598"/>
      <stop offset="1" stop-color="#009efd"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ff8a4c"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7aa2"/>
      <stop offset="1" stop-color="#ff4d4d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Z" fill="#6ee7b7"/>
    </marker>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
      .title { font-size: 64px; font-weight: 820; letter-spacing: 0; fill: #f7fbff; }
      .subtitle { font-size: 25px; font-weight: 520; fill: #b9c7d8; }
      .section { font-size: 25px; font-weight: 780; fill: #f7fbff; }
      .body { font-size: 20px; font-weight: 520; fill: #d7e1ee; }
      .muted { font-size: 17px; font-weight: 500; fill: #93a4b8; }
      .tiny { font-size: 15px; font-weight: 600; fill: #9fb0c3; }
      .chip { font-size: 16px; font-weight: 760; fill: #06131a; }
      .num { font-size: 35px; font-weight: 860; fill: #ffffff; }
      .step { font-size: 14px; font-weight: 820; fill: #08131a; }
      .card { fill: rgba(255,255,255,0.075); stroke: rgba(255,255,255,0.15); stroke-width: 1.2; }
      .card2 { fill: rgba(10,20,32,0.78); stroke: rgba(255,255,255,0.14); stroke-width: 1.2; }
      .line { stroke: #6ee7b7; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .flow { stroke: rgba(110,231,183,0.72); stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .thin { stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="130" cy="120" r="190" fill="#1743ff" opacity="0.12" filter="url(#soft)"/>
  <circle cx="1440" cy="160" r="210" fill="#15d6a3" opacity="0.12" filter="url(#soft)"/>
  <circle cx="1260" cy="905" r="250" fill="#ffb020" opacity="0.10" filter="url(#soft)"/>

  <g class="font">
    <rect x="70" y="58" width="1460" height="884" rx="34" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.13)"/>

    <g transform="translate(110 105)">
      <rect x="0" y="0" width="252" height="42" rx="21" fill="url(#green)"/>
      <text x="24" y="28" class="chip">Polymarket Copy Trade Bot</text>
      <text x="0" y="116" class="title">一图读懂本项目</text>
      <text x="0" y="158" class="subtitle">读取目标钱包持仓，按可配置策略过滤与控额，自动在自己的账户里建仓或加仓。</text>
    </g>

    <g transform="translate(1120 92)">
      <rect x="0" y="0" width="334" height="142" rx="18" class="card2" filter="url(#shadow)"/>
      <text x="28" y="42" class="muted">核心节奏</text>
      <text x="28" y="86" class="num">定时轮询</text>
      <text x="28" y="118" class="body">扫描目标钱包 + 同步自身持仓</text>
    </g>

    <g transform="translate(105 310)">
      <rect x="0" y="0" width="310" height="214" rx="22" class="card" filter="url(#shadow)"/>
      <rect x="28" y="30" width="58" height="30" rx="15" fill="url(#green)"/>
      <text x="45" y="51" class="step">01</text>
      <text x="104" y="52" class="section">跟谁</text>
      <text x="28" y="100" class="body">配置多个目标钱包</text>
      <text x="28" y="132" class="muted">每个钱包对应一套策略</text>
      <text x="28" y="160" class="muted">地址与昵称只保存在代码配置</text>
      <text x="28" y="190" class="tiny">每个策略可独立启停、命名、模拟交易</text>
    </g>

    <g transform="translate(472 310)">
      <rect x="0" y="0" width="330" height="214" rx="22" class="card" filter="url(#shadow)"/>
      <rect x="28" y="30" width="58" height="30" rx="15" fill="url(#green)"/>
      <text x="45" y="51" class="step">02</text>
      <text x="104" y="52" class="section">筛什么</text>
      <text x="28" y="100" class="body">只跟目标仓位中的优质区间</text>
      <text x="28" y="132" class="muted">按仓位规模、均价、现价过滤</text>
      <text x="28" y="160" class="muted">阈值可按目标交易数据调整</text>
      <text x="28" y="190" class="tiny">避开极端赔率、低流动性、临近结算标的</text>
    </g>

    <g transform="translate(860 310)">
      <rect x="0" y="0" width="330" height="214" rx="22" class="card" filter="url(#shadow)"/>
      <rect x="28" y="30" width="58" height="30" rx="15" fill="url(#green)"/>
      <text x="45" y="51" class="step">03</text>
      <text x="104" y="52" class="section">买多少</text>
      <text x="28" y="100" class="body">固定额度或按目标仓位动态计算</text>
      <text x="28" y="132" class="muted">结合目标仓位大小做比例映射</text>
      <text x="28" y="160" class="muted">再扣减自己的已有持仓</text>
      <text x="28" y="190" class="tiny">按“目标额度 - 已持仓”计算剩余额度</text>
    </g>

    <g transform="translate(1248 310)">
      <rect x="0" y="0" width="248" height="214" rx="22" class="card" filter="url(#shadow)"/>
      <rect x="28" y="30" width="58" height="30" rx="15" fill="url(#green)"/>
      <text x="45" y="51" class="step">04</text>
      <text x="104" y="52" class="section">怎么成交</text>
      <text x="28" y="100" class="body">CLOB 市价买入</text>
      <text x="28" y="132" class="muted">FOK 即成即撤</text>
      <text x="28" y="160" class="muted">按市场价与滑点保护提交</text>
      <text x="28" y="190" class="tiny">成交回报由 WebSocket 确认</text>
    </g>

    <path class="line" d="M420 417 C442 417 444 417 464 417"/>
    <path class="line" d="M808 417 C830 417 832 417 852 417"/>
    <path class="line" d="M1196 417 C1218 417 1220 417 1240 417"/>

    <g transform="translate(105 574)">
      <rect x="0" y="0" width="905" height="260" rx="24" class="card2" filter="url(#shadow)"/>
      <text x="34" y="48" class="section">主循环实现逻辑</text>
      <line x1="34" y1="76" x2="858" y2="76" class="thin"/>

      <g transform="translate(34 108)">
        <rect x="0" y="0" width="156" height="72" rx="14" fill="rgba(110,231,183,0.13)" stroke="rgba(110,231,183,0.38)"/>
        <text x="20" y="30" class="body">同步自己仓位</text>
        <text x="20" y="56" class="tiny">失败则跳过本轮</text>
      </g>
      <g transform="translate(230 108)">
        <rect x="0" y="0" width="156" height="72" rx="14" fill="rgba(110,231,183,0.13)" stroke="rgba(110,231,183,0.38)"/>
        <text x="20" y="30" class="body">拉取目标持仓</text>
        <text x="20" y="56" class="tiny">按策略逐个处理</text>
      </g>
      <g transform="translate(426 108)">
        <rect x="0" y="0" width="156" height="72" rx="14" fill="rgba(110,231,183,0.13)" stroke="rgba(110,231,183,0.38)"/>
        <text x="20" y="30" class="body">过滤 + 控额</text>
        <text x="20" y="56" class="tiny">不足额度则跳过</text>
      </g>
      <g transform="translate(622 108)">
        <rect x="0" y="0" width="202" height="72" rx="14" fill="rgba(110,231,183,0.13)" stroke="rgba(110,231,183,0.38)"/>
        <text x="20" y="30" class="body">下单并等成交</text>
        <text x="20" y="56" class="tiny">MarketOrder + FOK</text>
      </g>
      <path class="flow" d="M196 144 L224 144"/>
      <path class="flow" d="M392 144 L420 144"/>
      <path class="flow" d="M588 144 L616 144"/>

      <g transform="translate(34 208)">
        <text x="0" y="0" class="tiny">关键状态缓存：</text>
        <text x="118" y="0" class="tiny mono">soldAssetMap</text>
        <text x="246" y="0" class="tiny">卖出后短期内不买回</text>
        <text x="420" y="0" class="tiny mono">confirmedBoughtValueMap</text>
        <text x="642" y="0" class="tiny">防止确认前重复加仓</text>
      </g>
    </g>

    <g transform="translate(1050 574)">
      <rect x="0" y="0" width="446" height="260" rx="24" class="card2" filter="url(#shadow)"/>
      <text x="34" y="48" class="section">成交确认与通知</text>
      <line x1="34" y1="76" x2="410" y2="76" class="thin"/>
      <g transform="translate(34 104)">
        <rect x="0" y="0" width="378" height="64" rx="15" fill="rgba(0,158,253,0.13)" stroke="rgba(0,158,253,0.35)"/>
        <text x="22" y="28" class="body">用户 WebSocket 监听 trade 事件</text>
        <text x="22" y="52" class="tiny">自动重连，冷却后继续尝试</text>
      </g>
      <g transform="translate(34 186)">
        <text x="0" y="0" class="body">买进 / 止损 / 收米</text>
        <text x="0" y="34" class="muted">真实成交后推送 Server 酱</text>
        <text x="0" y="68" class="tiny">推送失败只记录日志，不阻断主流程</text>
      </g>
    </g>

    <g transform="translate(105 870)">
      <rect x="0" y="0" width="1391" height="54" rx="18" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
      <text x="28" y="35" class="body">辅助能力：</text>
      <text x="134" y="35" class="muted">高价退出 / redeem</text>
      <text x="310" y="35" class="muted">手动市价或限价卖出</text>
      <text x="530" y="35" class="muted">split / merge / 负风险处理</text>
      <text x="806" y="35" class="muted">Clash 节点健康检查</text>
      <text x="1032" y="35" class="muted">dry run 模拟</text>
      <text x="1172" y="35" class="muted">提交前密钥扫描</text>
    </g>

    <g transform="translate(112 286)">
      <text x="0" y="0" class="tiny">策略保护线：过滤条件、买入额度、滑点和最低下单门槛均可按目标钱包交易数据手动调整。</text>
    </g>
  </g>
</svg>
